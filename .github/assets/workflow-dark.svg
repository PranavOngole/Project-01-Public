<text x="36.0" y="130" font-size="10.6" fill="#9aa4b1">The user defines the</text>
<text x="36.0" y="145" font-size="10.6" fill="#9aa4b1">thesis, guardrails, and</text>
<text x="36.0" y="160" font-size="10.6" fill="#9aa4b1">appetite for risk.</text>
