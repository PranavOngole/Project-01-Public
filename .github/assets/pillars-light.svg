<text x="60.0" y="112" font-size="15" font-weight="700" fill="#11151c">Release History</text>
<text x="60.0" y="136" font-size="11" fill="#5b6573">Every minor version has a theme, outcome,</text>
<text x="60.0" y="152" font-size="11" fill="#5b6573">and acceptance gate. The public repo shows</text>
<text x="60.0" y="168" font-size="11" fill="#5b6573">the thinking behind the build.</text>
