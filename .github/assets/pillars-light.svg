<text x="694.6666666666666" y="112" font-size="15" font-weight="700" fill="#11151c">Public Boundary</text>
<text x="694.6666666666666" y="136" font-size="11" fill="#5b6573">Private prompts and implementation stay</text>
<text x="694.6666666666666" y="152" font-size="11" fill="#5b6573">private, but public contracts and examples</text>
<text x="694.6666666666666" y="168" font-size="11" fill="#5b6573">show the architecture without leaking IP.</text>
