<rect x="377.3333333333333" y="46" width="30" height="30" rx="8" fill="#ffffff" stroke="#e4e7eb" stroke-width="1"/><polygon points="392.3,52.4 394.4,58.1 400.5,58.3 395.8,62.1 397.4,68.0 392.3,64.6 387.3,68.0 388.9,62.1 384.2,58.3 390.2,58.1" fill="none" stroke="#0f766e" stroke-width="1.6" stroke-linejoin="round"/>
<text x="377.3333333333333" y="112" font-size="15" font-weight="700" fill="#11151c">External Review</text>
<text x="377.3333333333333" y="136" font-size="11" fill="#5b6573">CR-01 moved from findings to remediation,</text>
<text x="377.3333333333333" y="152" font-size="11" fill="#5b6573">documenting how production trust improved</text>
<text x="377.3333333333333" y="168" font-size="11" fill="#5b6573">instead of hiding the messy middle.</text>
